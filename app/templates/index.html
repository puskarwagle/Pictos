<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NarrateImage - AI Image Suggester</title>
    <link rel="icon" type="image/png" href="/static/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="shortcut icon" href="/static/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="NarrateImage" />
    <link rel="manifest" href="/static/site.webmanifest" />
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container-fluid">
        <!-- <header class="app-header"> -->
            <!-- <img src="/static/favicon.svg" alt="NarrateImage Logo" class="app-logo"> -->
            <!-- <h1>NarrateImage</h1> -->
        <!-- </header> -->
        
        <div class="main-layout">
            <aside class="sidebar">
                <div id="activeScriptHeader">
                    <button id="backBtn" class="secondary-btn icon-btn" title="Back to List"><span>&larr;</span></button>
                    <h3 id="selectedScriptName"></h3>
                </div>

                <div id="scriptsListContainer" class="sidebar-card">
                    <h3>Select Script</h3>
                    <div id="scriptsList" class="scripts-grid">
                        <!-- Script tiles will be injected here -->
                    </div>
                </div>

                <div id="scriptActions">
                    <div class="sidebar-controls">
                        <div class="control-group">
                            <div class="platform-selector">
                                <div id="sourceCheckboxes" class="source-checkbox-group">
                                    <div class="optgroup-label">Scrapers (Browser)</div>
                                    <label><input type="checkbox" name="source" value="pinterest" checked> Pinterest</label>
                                    <label><input type="checkbox" name="source" value="unsplash"> Unsplash</label>
                                    
                                    <div class="optgroup-label">Photography APIs</div>
                                    <label><input type="checkbox" name="source" value="picsum"> Lorem Picsum (Random)</label>
                                    <label><input type="checkbox" name="source" value="nasa"> NASA Images</label>
                                    
                                    <div class="optgroup-label">Art &amp; Museum</div>
                                    <label><input type="checkbox" name="source" value="met"> Met Museum</label>
                                    
                                    <div class="optgroup-label">Avatars &amp; Illustrations</div>
                                    <label><input type="checkbox" name="source" value="dicebear"> DiceBear Avatars</label>
                                    <label><input type="checkbox" name="source" value="robohash"> RoboHash</label>
                                    <label><input type="checkbox" name="source" value="uiavatars"> UI Avatars</label>
                                </div>
                            </div>
                        </div>
                        <button id="processBtn"><span>&#10024;</span> Process with AI</button>
                    </div>
                </div>

                <div class="settings-card sidebar-card">
                    <div class="toggle-container">
                        <span class="toggle-label">Edit Mode</span>
                        <label class="switch">
                            <input type="checkbox" id="editModeToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="toggle-container">
                        <span class="toggle-label">Dark Mode</span>
                        <label class="switch">
                            <input type="checkbox" id="darkModeToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </aside>

            <main class="content-area" id="contentArea">
                <div id="editorContainer" class="editor-section">
                    <textarea id="scriptEditor" placeholder="Script content will appear here..."></textarea>
                </div>

                <div id="segmentsContainer" class="segments-container">
                    <!-- Segment blocks will be injected here -->
                </div>
            </main>

            <div id="resizer" class="resizer">
                <div class="resizer-handle"></div>
            </div>

            <aside class="right-sidebar" id="rightSidebar">
                <div class="sidebar-header sidebar-card" id="rightSidebarHeader">
                    <div id="statusMessage">Ready</div>
                    <button id="deleteSelectedBtn" class="delete-btn">Delete Selected</button>
                </div>
                <div id="rightSidebarImages" class="right-sidebar-images">
                    <p>Select a segment to view images.</p>
                </div>
            </aside>
        </div>
    </div>
    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImg">
        <div id="modalCaption"></div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script type="module" src="/static/js/main.js"></script>
</body>
</html>
