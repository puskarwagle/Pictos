<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NarrateImage - AI Image Suggester</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container-fluid">
        <h1>NarrateImage</h1>
        
        <div class="main-layout">
            <div class="sidebar">
                <div id="activeScriptHeader" style="display: none; align-items: center; gap: 15px; margin-bottom: 20px;">
                    <button id="backBtn" class="secondary-btn icon-btn" title="Back to List"><span>&larr;</span></button>
                    <h3 id="selectedScriptName" style="margin: 0; flex: 1; font-size: 1.2rem; word-break: break-all;"></h3>
                </div>

                <div id="scriptsListContainer" class="sidebar-card">
                    <h3>Select Script</h3>
                    <div id="scriptsList" class="scripts-grid">
                        <!-- Script tiles will be injected here -->
                    </div>
                </div>

                <div id="scriptActions" style="display: none;">
                    <div class="sidebar-controls">
                        <div class="control-group">
                            <div class="platform-selector">
                                <div id="sourceCheckboxes" class="source-checkbox-group">
                                    <div class="optgroup-label">Scrapers (Browser)</div>
                                    <label><input type="checkbox" name="source" value="pinterest" checked> Pinterest</label>
                                    <label><input type="checkbox" name="source" value="unsplash"> Unsplash</label>
                                    
                                    <div class="optgroup-label">Photography APIs</div>
                                    <label><input type="checkbox" name="source" value="picsum"> Lorem Picsum (Random)</label>
                                    <label><input type="checkbox" name="source" value="nasa"> NASA Images</label>
                                    
                                    <div class="optgroup-label">Art &amp; Museum</div>
                                    <label><input type="checkbox" name="source" value="met"> Met Museum</label>
                                    
                                    <div class="optgroup-label">Avatars &amp; Illustrations</div>
                                    <label><input type="checkbox" name="source" value="dicebear"> DiceBear Avatars</label>
                                    <label><input type="checkbox" name="source" value="robohash"> RoboHash</label>
                                    <label><input type="checkbox" name="source" value="uiavatars"> UI Avatars</label>
                                </div>
                            </div>
                        </div>
                        <button id="processBtn"><span>&#10024;</span> Process with AI</button>
                    </div>
                </div>

                <div class="settings-card sidebar-card" style="margin-top: auto;">
                    <div class="toggle-container">
                        <span class="toggle-label">Edit Mode</span>
                        <label class="switch">
                            <input type="checkbox" id="editModeToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="toggle-container">
                        <span class="toggle-label">Dark Mode</span>
                        <label class="switch">
                            <input type="checkbox" id="darkModeToggle">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="content-area" id="contentArea">
                <div id="editorContainer" class="editor-section" style="display: none;">
                    <textarea id="scriptEditor" placeholder="Script content will appear here..."></textarea>
                </div>

                <div id="segmentsContainer" class="segments-container">
                    <!-- Segment blocks will be injected here -->
                </div>
            </div>

            <div class="right-sidebar" id="rightSidebar">
                <div class="sidebar-header sidebar-card" id="rightSidebarHeader">
                    <div id="statusMessage" style="color: var(--status-text); font-size: 0.9rem; font-weight: normal; margin: 0; min-height: 1.2rem; flex: 1;">Ready</div>
                    <button id="deleteSelectedBtn" class="delete-btn" style="display: none;">Delete Selected</button>
                </div>
                <div id="rightSidebarImages" class="right-sidebar-images" style="padding: 5px;">
                    <p style="color: var(--status-text); font-style: italic; text-align: center;">Select a segment to view images.</p>
                </div>
            </div>
        </div>
    </div>
    <div id="imageModal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="modalImg">
        <div id="modalCaption"></div>
    </div>

    <div id="toastContainer" class="toast-container"></div>

    <script src="/static/script.js"></script>
</body>
</html>
